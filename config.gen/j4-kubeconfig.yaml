      server: https://omni-k8s.janncot.com
    name: kmp-omni-j4
contexts:
  - context:
      cluster: kmp-omni-j4
      namespace: default
      user: kmp-omni-j4-ferry133@gmail.com
    name: kmp-omni-j4
current-context: kmp-omni-j4
users:
- name: kmp-omni-j4-ferry133@gmail.com
  user:
    exec:
      apiVersion: client.authentication.k8s.io/v1beta1
      args:
        - oidc-login
        - get-token
